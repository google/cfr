<div class="container p-1 app-map-panel">
  <mat-slide-toggle [checked]="active$ | async" (change)="onToggleActive($event)"
    >Activate travel simulator</mat-slide-toggle
  >
  <div class="time-value">{{ (time$ | async) * 1000 | date: 'short' }}</div>
  <mat-slider
    class="w-100 pt-0"
    [value]="time$ | async"
    [min]="start$ | async"
    [max]="end$ | async"
    (input)="onTimeChanged($event)"></mat-slider>
</div>
